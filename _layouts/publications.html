---
layout: default
---

{% include base_path %}

<main class="publications-page" id="main" role="main">
  <header class="publications-page__header">
    <!--  <p class="home-eyebrow">Research Output</p> -->
    <h1>{{ page.title }}</h1>
    <!-- Ceci est un commentaire sur une seule ligne <p>Peer-reviewed work on reinforcement learning, Physical AI, autonomous air combat and physical-layer security for B5G and 6G systems.</p> -->
  </header>

  <section class="publication-list publication-list--detail" aria-label="Publications">
    {% for publication in site.data.publications %}
      {% include publication-card.html publication=publication %}
    {% endfor %}
  </section>
</main>

<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {% for publication in site.data.publications %}
      {
        "@type": "ScholarlyArticle",
        "headline": {{ publication.title | jsonify }},
        "author": [
          {% for author in publication.authors %}
          {
            "@type": "Person",
            "name": {{ author | jsonify }}
          }{% unless forloop.last %},{% endunless %}
          {% endfor %}
        ],
        "datePublished": {{ publication.published_date | jsonify }},
        "isPartOf": {
          "@type": "CreativeWork",
          "name": {{ publication.venue | jsonify }}
        },
        "identifier": {{ publication.doi | prepend: "https://doi.org/" | jsonify }},
        "url": {{ publication.doi | prepend: "https://doi.org/" | jsonify }},
        "keywords": {{ publication.keywords | join: ", " | jsonify }}
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ]
  }
</script>

{{ content }}
